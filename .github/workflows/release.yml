name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  offline-bundle:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Build offline bundle
        run: |
          set -euo pipefail
          BUNDLE=mymcp-${{ needs.build.outputs.version }}-offline-bundle
          mkdir -p $BUNDLE/wheels
          pip download dist/*.whl -d $BUNDLE/wheels \
              --python-version 3.11 \
              --platform manylinux2014_x86_64 \
              --only-binary=:all:
          bash scripts/fetch-ripgrep.sh $BUNDLE
          cp scripts/install-offline.sh $BUNDLE/
          chmod +x $BUNDLE/install-offline.sh
          tar czf ${BUNDLE}.tar.gz $BUNDLE
          ls -la ${BUNDLE}.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: offline-bundle
          path: mymcp-*-offline-bundle.tar.gz

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Don't fail the job if the version is already on PyPI (e.g. it was
          # uploaded manually for the first release before Trusted Publisher
          # was wired up). Lets github-release proceed.
          skip-existing: true

  github-release:
    runs-on: ubuntu-latest
    needs: [build, offline-bundle, publish-pypi]
    if: always() && needs.build.result == 'success' && needs.offline-bundle.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: offline-bundle
          path: .
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            mymcp-*-offline-bundle.tar.gz
          generate_release_notes: true

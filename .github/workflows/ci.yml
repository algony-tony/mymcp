name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pydantic pydantic-settings types-setuptools
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src/mymcp

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=src/mymcp --cov-branch --cov-report=term-missing --benchmark-disable

      - name: Update coverage badges
        if: github.ref == 'refs/heads/master' && matrix.python-version == '3.12'
        run: |
          LINE_COV=$(python -m pytest tests/ --cov=src/mymcp --cov-report=term -q --benchmark-disable 2>/dev/null | grep '^TOTAL' | awk '{print $NF}' | tr -d '%')
          BRANCH_COV=$(python -m pytest tests/ --cov=src/mymcp --cov-branch --cov-report=term -q --benchmark-disable 2>/dev/null | grep '^TOTAL' | awk '{print $NF}' | tr -d '%')

          if [ "$LINE_COV" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$LINE_COV" -ge 80 ]; then COLOR="green"
          elif [ "$LINE_COV" -ge 70 ]; then COLOR="yellowgreen"
          elif [ "$LINE_COV" -ge 60 ]; then COLOR="yellow"
          else COLOR="red"; fi
          LINE_JSON="{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${LINE_COV}%\",\"color\":\"${COLOR}\"}"

          if [ "$BRANCH_COV" -ge 85 ]; then BCOLOR="brightgreen"
          elif [ "$BRANCH_COV" -ge 75 ]; then BCOLOR="green"
          elif [ "$BRANCH_COV" -ge 65 ]; then BCOLOR="yellowgreen"
          elif [ "$BRANCH_COV" -ge 55 ]; then BCOLOR="yellow"
          else BCOLOR="red"; fi
          BRANCH_JSON="{\"schemaVersion\":1,\"label\":\"branch coverage\",\"message\":\"${BRANCH_COV}%\",\"color\":\"${BCOLOR}\"}"

          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.GIST_TOKEN }}" \
            -d "{\"files\":{\"mymcp-coverage.json\":{\"content\":$(echo "$LINE_JSON" | python -c 'import sys,json; print(json.dumps(sys.stdin.read()))')},\"mymcp-branch-coverage.json\":{\"content\":$(echo "$BRANCH_JSON" | python -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}}}" \
            "https://api.github.com/gists/${{ secrets.GIST_ID }}"

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats
      - name: Run legacy install/upgrade bats tests
        run: |
          bats tests/test_install.bats tests/test_upgrade.bats tests/test_upgrade_integration.bats

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          retention-days: 7

  mutation:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs: test
    concurrency:
      group: mutation-master
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mutation testing
        run: |
          python -m mutmut run --no-progress 2>&1 || true
          python -m mutmut results > mutmut-results.txt 2>&1 || true
          cat mutmut-results.txt

      - name: Update mutation badge
        run: |
          SCORE=$(python -c "
          import sqlite3
          try:
              conn = sqlite3.connect('.mutmut-cache')
              c = conn.cursor()
              counts = dict(c.execute('SELECT status, count(*) FROM mutant GROUP BY status').fetchall())
              conn.close()
              killed = counts.get('ok_killed', 0)
              survived = counts.get('bad_survived', 0)
              timeout = counts.get('bad_timeout', 0)
              total = killed + survived + timeout
              print(killed * 100 // total if total > 0 else 0)
          except Exception:
              print(0)
          ")

          if [ "$SCORE" -ge 80 ]; then COLOR="brightgreen"
          elif [ "$SCORE" -ge 70 ]; then COLOR="green"
          elif [ "$SCORE" -ge 60 ]; then COLOR="yellowgreen"
          elif [ "$SCORE" -ge 50 ]; then COLOR="yellow"
          else COLOR="red"; fi

          MUTATION_JSON="{\"schemaVersion\":1,\"label\":\"mutation score\",\"message\":\"${SCORE}%\",\"color\":\"${COLOR}\"}"
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.GIST_TOKEN }}" \
            -d "{\"files\":{\"mymcp-mutation.json\":{\"content\":$(echo "$MUTATION_JSON" | python -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}}}" \
            "https://api.github.com/gists/${{ secrets.GIST_ID }}"

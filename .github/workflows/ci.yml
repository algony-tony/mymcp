name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src/mymcp

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=src/mymcp --cov-branch --cov-report=term-missing --benchmark-disable

      - name: Update coverage badges
        if: github.ref == 'refs/heads/master' && matrix.python-version == '3.12'
        run: |
          LINE_COV=$(python -m pytest tests/ --cov=src/mymcp --cov-report=term -q --benchmark-disable 2>/dev/null | grep '^TOTAL' | awk '{print $NF}' | tr -d '%')
          BRANCH_COV=$(python -m pytest tests/ --cov=src/mymcp --cov-branch --cov-report=term -q --benchmark-disable 2>/dev/null | grep '^TOTAL' | awk '{print $NF}' | tr -d '%')

          if [ "$LINE_COV" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$LINE_COV" -ge 80 ]; then COLOR="green"
          elif [ "$LINE_COV" -ge 70 ]; then COLOR="yellowgreen"
          elif [ "$LINE_COV" -ge 60 ]; then COLOR="yellow"
          else COLOR="red"; fi
          LINE_JSON="{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${LINE_COV}%\",\"color\":\"${COLOR}\"}"

          if [ "$BRANCH_COV" -ge 85 ]; then BCOLOR="brightgreen"
          elif [ "$BRANCH_COV" -ge 75 ]; then BCOLOR="green"
          elif [ "$BRANCH_COV" -ge 65 ]; then BCOLOR="yellowgreen"
          elif [ "$BRANCH_COV" -ge 55 ]; then BCOLOR="yellow"
          else BCOLOR="red"; fi
          BRANCH_JSON="{\"schemaVersion\":1,\"label\":\"branch coverage\",\"message\":\"${BRANCH_COV}%\",\"color\":\"${BCOLOR}\"}"

          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.GIST_TOKEN }}" \
            -d "{\"files\":{\"mymcp-coverage.json\":{\"content\":$(echo "$LINE_JSON" | python -c 'import sys,json; print(json.dumps(sys.stdin.read()))')},\"mymcp-branch-coverage.json\":{\"content\":$(echo "$BRANCH_JSON" | python -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}}}" \
            "https://api.github.com/gists/${{ secrets.GIST_ID }}"

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats
      - name: Run legacy install/upgrade bats tests
        run: |
          bats tests/test_install.bats tests/test_upgrade.bats tests/test_upgrade_integration.bats

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          retention-days: 7

  mutation-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Restrict mutmut to smoke-test files
        env:
          MUTATION_PATHS_JSON: '["src/mymcp/auth.py", "src/mymcp/config.py"]'
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          marker = "[tool.mutmut]\n"
          path = Path("pyproject.toml")
          text = path.read_text()
          head, found, _ = text.partition(marker)
          if not found:
              raise SystemExit("Could not find [tool.mutmut] section in pyproject.toml")

          mutation_paths = json.loads(os.environ["MUTATION_PATHS_JSON"])
          rendered_paths = ",\n".join(f'    "{p}"' for p in mutation_paths)
          path.write_text(
              head
              + "[tool.mutmut]\n"
              + "paths_to_mutate = [\n"
              + rendered_paths
              + "\n]\n"
              + 'also_copy = ["src/"]\n'
              + 'tests_dir = ["tests/"]\n'
              + 'pytest_add_cli_args = ["--benchmark-disable"]\n'
          )
          PY

      - name: Run mutation smoke test
        run: |
          rm -rf mutants
          mutmut run --max-children 1
          mutmut export-cicd-stats
          mutmut results

  mutation-full:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: auth-config
            paths_json: '["src/mymcp/auth.py", "src/mymcp/config.py"]'
          - shard: bash
            paths_json: '["src/mymcp/tools/bash.py"]'
          - shard: files
            paths_json: '["src/mymcp/tools/files.py"]'
          - shard: protocol
            paths_json: '["src/mymcp/mcp_server.py"]'
    concurrency:
      group: mutation-master-${{ matrix.shard }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Restrict mutmut to shard
        env:
          MUTATION_PATHS_JSON: ${{ matrix.paths_json }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          marker = "[tool.mutmut]\n"
          path = Path("pyproject.toml")
          text = path.read_text()
          head, found, _ = text.partition(marker)
          if not found:
              raise SystemExit("Could not find [tool.mutmut] section in pyproject.toml")

          mutation_paths = json.loads(os.environ["MUTATION_PATHS_JSON"])
          rendered_paths = ",\n".join(f'    "{p}"' for p in mutation_paths)
          path.write_text(
              head
              + "[tool.mutmut]\n"
              + "paths_to_mutate = [\n"
              + rendered_paths
              + "\n]\n"
              + 'also_copy = ["src/"]\n'
              + 'tests_dir = ["tests/"]\n'
              + 'pytest_add_cli_args = ["--benchmark-disable"]\n'
          )
          PY

      - name: Run mutation testing for ${{ matrix.shard }}
        run: |
          rm -rf mutants
          mutmut run --max-children 1
          mutmut export-cicd-stats
          mutmut results | tee mutation-results-${{ matrix.shard }}.txt

      - name: Prepare shard stats artifact
        run: |
          cp mutants/mutmut-cicd-stats.json mutation-stats-${{ matrix.shard }}.json

      - name: Upload mutation shard artifact
        uses: actions/upload-artifact@v4
        with:
          name: mutation-stats-${{ matrix.shard }}
          path: |
            mutation-stats-${{ matrix.shard }}.json
            mutation-results-${{ matrix.shard }}.txt
          retention-days: 7

  mutation-aggregate:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs: mutation-full

    steps:
      - name: Download mutation shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mutation-stats-*
          path: mutation-artifacts
          merge-multiple: true

      - name: Update mutation badge
        run: |
          SCORE=$(python - <<'PY'
          import json
          import sys
          from pathlib import Path

          stats_paths = sorted(Path("mutation-artifacts").glob("mutation-stats-*.json"))
          if not stats_paths:
              print("DEBUG: no mutation shard stats found", file=sys.stderr)
              print(0)
              raise SystemExit()

          totals = {
              "killed": 0,
              "survived": 0,
              "timeout": 0,
              "suspicious": 0,
              "total": 0,
              "no_tests": 0,
              "skipped": 0,
              "check_was_interrupted_by_user": 0,
              "segfault": 0,
          }
          for stats_path in stats_paths:
              with stats_path.open() as f:
                  shard = json.load(f)
              print(f"DEBUG: {stats_path.name}={shard}", file=sys.stderr)
              for key in totals:
                  totals[key] += shard.get(key, 0)

          print(f"DEBUG: aggregate={totals}", file=sys.stderr)
          denominator = totals["killed"] + totals["survived"] + totals["timeout"] + totals["suspicious"]
          print(totals["killed"] * 100 // denominator if denominator > 0 else 0)
          PY
          )

          if [ "$SCORE" -ge 80 ]; then COLOR="brightgreen"
          elif [ "$SCORE" -ge 70 ]; then COLOR="green"
          elif [ "$SCORE" -ge 60 ]; then COLOR="yellowgreen"
          elif [ "$SCORE" -ge 50 ]; then COLOR="yellow"
          else COLOR="red"; fi

          MUTATION_JSON="{\"schemaVersion\":1,\"label\":\"mutation score\",\"message\":\"${SCORE}%\",\"color\":\"${COLOR}\"}"
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.GIST_TOKEN }}" \
            -d "{\"files\":{\"mymcp-mutation.json\":{\"content\":$(echo "$MUTATION_JSON" | python -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}}}" \
            "https://api.github.com/gists/${{ secrets.GIST_ID }}"
